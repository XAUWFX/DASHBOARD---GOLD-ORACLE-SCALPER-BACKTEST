name: Actualizar Dashboard de Trading

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - 'data/trades.csv'
      - 'scripts/generate_dashboard.py'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar código del repositorio
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy plotly
      
      - name: 🔧 Generar dashboard
        run: python generate_dashboard.py
      
      - name: 📤 Subir cambios a GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.html
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Actualización automática del dashboard [skip ci]"
          git push
